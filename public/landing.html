<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowthRing — Discover & Grow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans">
    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold tracking-tighter">GrowthRing</h1>
        <button class="bg-black text-white px-5 py-2 rounded-full font-medium text-sm">Join Waitlist</button>
    </nav>
    <header class="max-w-5xl mx-auto py-20 text-center">
        <h2 class="text-6xl font-extrabold tracking-tighter mb-6">Discover active users. <br>Grow together on X.</h2>
        <p class="text-xl text-zinc-600 mb-10">The largest discovery network for active X users.</p>
        <div class="flex gap-4 justify-center">
            <button class="bg-black text-white px-8 py-4 rounded-full font-semibold">Create Profile</button>
            <button class="border border-zinc-200 bg-white px-8 py-4 rounded-full font-semibold">Browse Feed</button>
        </div>
    </header>
    <section class="max-w-5xl mx-auto py-10">
        <h3 class="text-2xl font-bold mb-6">Trending Growers Today</h3>
        <div class="grid grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-zinc-100 shadow-sm">
                <p class="font-bold">@by0x_</p>
                <p class="text-sm text-zinc-500">Web3 Explorer</p>
                <div class="mt-4 text-green-600 font-medium">🟢 Active Today</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-zinc-100 shadow-sm">
                <p class="font-bold">@indie_dev</p>
                <p class="text-sm text-zinc-500">SaaS Founder</p>
                <div class="mt-4 text-yellow-600 font-medium">🟡 Active This Week</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-zinc-100 shadow-sm">
                <p class="font-bold">@designer_pro</p>
                <p class="text-sm text-zinc-500">UI/UX Designer</p>
                <div class="mt-4 text-blue-600 font-medium">🔵 New Member</div>
            </div>
        </div>
    </section>
</body>
</html>
